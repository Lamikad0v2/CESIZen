name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: powershell

jobs:
  ci:
    name: Build, Test & SonarCloud
    runs-on: self-hosted

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. PHP (Laragon) + Composer.bat ────────────────────────────
      - name: Setup PHP & Composer
        run: |
          $phpDir = "C:\laragon\bin\php\php-8.3.16-Win32-vs16-x64"
          $bin    = "C:\Users\Jordan\.runner-tools"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null

          # Toujours régénérer le .bat (peut changer entre runs)
          if (-not (Test-Path "$bin\composer.phar")) {
            & "$phpDir\php.exe" -r "copy('https://getcomposer.org/installer','cs.php');"
            & "$phpDir\php.exe" cs.php --install-dir="$bin" --filename=composer.phar
            Remove-Item -Force cs.php
          }

          # Wrapper .bat avec zip activé
          $bat = "@echo off`r`n`"$phpDir\php.exe`" -d extension=`"$phpDir\ext\php_zip.dll`" `"$bin\composer.phar`" %*"
          Set-Content -Path "$bin\composer.bat" -Value $bat -Encoding ASCII

          Add-Content -Path $env:GITHUB_PATH -Value $phpDir
          Add-Content -Path $env:GITHUB_PATH -Value $bin

      # ── 3. Backend PHP ─────────────────────────────────────────────
      - name: Install PHP dependencies
        working-directory: backend
        shell: cmd
        run: |
          rmdir /s /q vendor 2>nul
          "C:\Users\Jordan\.runner-tools\composer.bat" install --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        working-directory: backend
        shell: cmd
        run: vendor\bin\phpunit.bat

      # ── 4. Frontend React ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Unit tests with coverage (Vitest)
        working-directory: frontend
        run: npm run test:coverage

      - name: Build
        working-directory: frontend
        run: npm run build

      # ── 5. SonarCloud ──────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── 6. Docker — Build & Push (GHCR) ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/lamikad0v2/cesizen:latest
            ghcr.io/lamikad0v2/cesizen:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max
