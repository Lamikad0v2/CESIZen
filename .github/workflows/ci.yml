name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: powershell

jobs:
  # ══════════════════════════════════════════════════════════
  # JOB 1 — CI : Build · Test · SonarCloud · Docker Push
  # ══════════════════════════════════════════════════════════
  ci:
    name: Build, Test & SonarCloud
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. PHP (Laragon) + Composer.bat ────────────────────────────
      - name: Setup PHP & Composer
        run: |
          $phpDir = "C:\laragon\bin\php\php-8.3.16-Win32-vs16-x64"
          $bin    = "C:\Users\Jordan\.runner-tools"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null

          # Toujours régénérer le .bat (peut changer entre runs)
          if (-not (Test-Path "$bin\composer.phar")) {
            & "$phpDir\php.exe" -r "copy('https://getcomposer.org/installer','cs.php');"
            & "$phpDir\php.exe" cs.php --install-dir="$bin" --filename=composer.phar
            Remove-Item -Force cs.php
          }

          # Wrapper .bat avec zip activé
          $bat = "@echo off`r`n`"$phpDir\php.exe`" -d extension=`"$phpDir\ext\php_zip.dll`" `"$bin\composer.phar`" %*"
          Set-Content -Path "$bin\composer.bat" -Value $bat -Encoding ASCII

          Add-Content -Path $env:GITHUB_PATH -Value $phpDir
          Add-Content -Path $env:GITHUB_PATH -Value $bin

      # ── 3. Backend PHP ─────────────────────────────────────────────
      - name: Install PHP dependencies
        working-directory: backend
        shell: cmd
        run: |
          rmdir /s /q vendor 2>nul
          "C:\Users\Jordan\.runner-tools\composer.bat" install --no-interaction --prefer-dist

      - name: Run PHPUnit tests
        working-directory: backend
        shell: cmd
        continue-on-error: true
        run: vendor\bin\phpunit.bat

      # ── 4. Frontend React ──────────────────────────────────────────
      - name: Setup Node.js path
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\nodejs"

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Unit tests with coverage (Vitest)
        working-directory: frontend
        run: npm run test:coverage

      - name: Build
        working-directory: frontend
        run: npm run build

      # ── 5. SonarCloud ──────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── 6. Docker — Build & Push (GHCR) ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/lamikad0v2/cesizen:latest
            ghcr.io/lamikad0v2/cesizen:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════
  # JOB 2 — CD : Deploy (migration + redémarrage)
  # Déclenché uniquement sur push vers main, après CI vert.
  # ══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to local environment
    runs-on: self-hosted
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Deploy — migration + restart
        run: |
          & "$env:GITHUB_WORKSPACE\deploy.ps1"
