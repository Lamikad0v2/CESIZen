# upstream.conf — géré automatiquement par deploy-blue-green.ps1
# Slot actif initial : blue
# Ne pas modifier manuellement — utiliser : .\deploy-blue-green.ps1

upstream cesizen_active {
    server app-blue:8080;
}

server {
    listen 80;
    server_name localhost;

    # Header de diagnostic : indique le slot actif dans les réponses HTTP
    add_header X-Active-Slot "blue" always;

    location / {
        proxy_pass            http://cesizen_active;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }
}
