# ── Identification projet ──────────────────────────────────────────
sonar.projectKey=Lamikad0v2_CESIZen
sonar.organization=lamikad0v2
sonar.projectName=CESIZen

# ── Sources ────────────────────────────────────────────────────────
sonar.sources=frontend/src,backend/core,backend/Models,backend/Controllers

# ── Tests ──────────────────────────────────────────────────────────
sonar.tests=frontend/src/__tests__,backend/tests

# ── Exclusions ─────────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/vendor/**,**/dist/**,frontend/src/setupTests.js,.github/**
sonar.iac.exclusions=**/Dockerfile

# ── Suppressions ciblées (règles sur fichiers spécifiques) ──────────
# docker:S6471 — PHP Apache requires root to bind port 80 (workers drop to www-data)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6471
sonar.issue.ignore.multicriteria.e1.resourceKey=Dockerfile
sonar.issue.ignore.multicriteria.e2.ruleKey=docker:S6471
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Dockerfile

# ── Coverage ───────────────────────────────────────────────────────
# JavaScript (Vitest lcov)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

#── Encodage ───────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
